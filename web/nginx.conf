# Front + reverse proxy for TechMind. One origin: the browser only ever talks to
# this nginx, which serves the static React build and forwards /api to the API
# container. Single origin means no CORS in production.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA routing: any path that is not a real file falls back to index.html, so
    # a hard refresh on /buscar serves the app instead of a 404. This is exactly
    # what OCI Object Storage cannot do on its own.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy to the API container over the internal compose network. The trailing
    # slash on proxy_pass strips the /api prefix: /api/health -> api:8080/health.
    location /api/ {
        proxy_pass http://api:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Hashed static assets can be cached hard; index.html must not (it points at
    # the current asset hashes).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
