name: CI

# Lint + tests on the 4 fronts. Path filters keep each front's job from
# running when unrelated folders change. See docs/TECHMIND.md section 7.
on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      inference: ${{ steps.filter.outputs.inference }}
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # Trigger each job on its real manifest/source, NOT the whole folder.
          # A front that is still just a README never fires its job (stays green
          # / skipped); once the real project exists, its checks run for real.
          filters: |
            inference:
              - 'inference/app/**'
              - 'inference/tests/**'
              - 'inference/requirements.txt'
            api:
              - 'api/pom.xml'
              - 'api/src/**'
            web:
              - 'web/package.json'
              - 'web/src/**'
              - 'web/vite.config.*'

  inference:
    needs: changes
    if: ${{ needs.changes.outputs.inference == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: inference
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install torch --index-url https://download.pytorch.org/whl/cpu
      - run: pip install -r requirements.txt
      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      - run: pytest -q

  api:
    needs: changes
    # api job also runs the CONTRACT TEST: mocks the Python service and
    # asserts the agreed JSON shape (docs/TECHMIND.md section 7).
    if: ${{ needs.changes.outputs.api == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
      - run: ./mvnw -q -B verify

  web:
    needs: changes
    if: ${{ needs.changes.outputs.web == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run build
