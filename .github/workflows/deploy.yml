name: Deploy

# Builds ON the VM over SSH, not on the runner: the VM is Ampere A1 (arm64) and
# GitHub runners are x86. Cross-building with buildx + QEMU works but takes
# 20-40 min once the transformer is baked in.
#
# A single job: api + inference build on the VM via docker compose. The web front
# (nginx) sits behind `profiles: [web]` in docker-compose.yml and is NOT built
# yet -- web/ is still a README with no package.json. When the front lands, add
# `--profile web` to the build/up commands below (or drop the profile in compose).
#
# The front is NOT uploaded to a bucket -- OCI Object Storage can't host a SPA,
# so nginx will serve it from the VM. No OCI_CLI_* secrets needed.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vm
  cancel-in-progress: false

jobs:
  deploy:
    name: api + inference -> Ampere VM
    runs-on: ubuntu-latest
    steps:
      - name: Build and restart on the VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          # No script_stop input in ssh-action@v1; `set -e` below does the job.
          script: |
            set -euo pipefail
            cd ~/techmind
            git fetch origin main
            git reset --hard origin/main
            # web is intentionally excluded (profiles: [web]) until web/ is real.
            # Add `--profile web` here when the front lands.
            docker compose build
            docker compose up -d --remove-orphans
            docker image prune -f
            docker compose ps
