spring.application.name=techapi

# Oracle Autonomous DB
spring.datasource.url=jdbc:oracle:thin:@your_db_tns_alias
spring.datasource.username=your_username
spring.datasource.password=your_password

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect

# Flyway
spring.flyway.locations=classpath:db/migration
spring.flyway.oracle.sql-migration-suffix=.sql

# Inference service
inference.base-url=http://localhost:8000
inference.connect-timeout=5s
inference.read-timeout=30s

# File uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# Scaffolding mode - exclude database auto-configuration
spring.autoconfigure.exclude=\
org.springframework.boot.jdbc.autoconfigure.DataSourceAutoConfiguration,\
org.springframework.boot.hibernate.autoconfigure.HibernateJpaAutoConfiguration
